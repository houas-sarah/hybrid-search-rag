services:
  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data                    # persist indexes + your documents
      - hf-cache:/root/.cache/huggingface   # cache downloaded HF models
    restart: unless-stopped

  # Optional fully-local LLM backend. Enable with:
  #   docker compose --profile local-llm up --build
  # then set in .env:  LLM_PROVIDER=ollama  and  OLLAMA_HOST=http://ollama:11434
  # and pull a model:  docker compose exec ollama ollama pull llama3
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  hf-cache:
  ollama:
